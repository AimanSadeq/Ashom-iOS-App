<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Ashom">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin Panel - VIFM University Programs</title>
    <link rel="stylesheet" href="/vifm-design-system.css">
    <script src="/vifm-theme.js"></script>
    <link rel="stylesheet" href="/vifm-ios.css">
    <script src="/vifm-ios.js"></script>
    <script src="/vifm-pwa.js"></script>
    <link rel="manifest" href="/manifest.json">
    <script src="/vifm-demo-data.js"></script>
    <script src="/vifm-demo.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/vifm-icons.css">
    <script src="/vifm-icons.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-primary); color: var(--text-primary); padding-bottom: 80px; min-height: 100vh; }
        .container { max-width: 100%; margin: 0 auto; padding: 0 16px; }
        @media (min-width: 768px) { .container { max-width: 1400px; padding: 0 24px; } }

        .top-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(16px); padding: 16px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 20px rgba(0,0,0,0.3); border-bottom: 1px solid var(--border); }
        .nav-header { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
        .nav-left { display: flex; align-items: center; gap: 12px; }
        .home-button { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 10px; background: rgba(83,145,213,0.08); border: 1px solid rgba(83,145,213,0.2); color: var(--accent-blue); font-size: 12px; font-weight: 600; text-decoration: none; }
        .back-link { display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 10px; background: rgba(83,145,213,0.08); border: 1px solid rgba(83,145,213,0.2); color: var(--accent-blue); font-size: 12px; font-weight: 600; text-decoration: none; }
        .page-title { font-size: 18px; font-weight: 700; background: linear-gradient(135deg, #E8ECF4, #7C3AED); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .admin-badge { padding: 4px 10px; border-radius: 8px; background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #EF4444; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        .glass-card { background: rgba(15,18,30,0.7); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
        .section-title { font-size: 15px; font-weight: 700; color: var(--text-primary); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .section-title i { color: var(--accent-blue); font-size: 14px; }

        /* Tab navigation */
        .tab-nav { display: flex; gap: 4px; padding: 4px; background: rgba(15,18,30,0.5); border-radius: 12px; margin: 16px 0; overflow-x: auto; }
        .tab-btn { padding: 10px 16px; border-radius: 10px; border: none; background: transparent; color: var(--text-secondary); font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
        .tab-btn.active { background: rgba(83,145,213,0.15); color: var(--accent-blue); border: 1px solid rgba(83,145,213,0.3); }
        .tab-btn:hover:not(.active) { background: rgba(255,255,255,0.05); }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .badge-count { background: rgba(239,68,68,0.2); color: #EF4444; font-size: 10px; padding: 2px 6px; border-radius: 8px; font-weight: 700; }

        /* Stats grid */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
        .stat-card { padding: 16px; border-radius: 12px; background: rgba(83,145,213,0.06); border: 1px solid rgba(83,145,213,0.15); text-align: center; }
        .stat-card.warn { background: rgba(245,158,11,0.06); border-color: rgba(245,158,11,0.15); }
        .stat-val { font-size: 28px; font-weight: 700; color: var(--accent-blue); }
        .stat-card.warn .stat-val { color: #F59E0B; }
        .stat-lbl { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }

        /* Table */
        .admin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .admin-table th { text-align: left; padding: 10px 12px; color: var(--text-secondary); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
        .admin-table td { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
        .admin-table tr:hover td { background: rgba(83,145,213,0.04); }
        .table-wrap { overflow-x: auto; }

        /* Status badges */
        .status-badge { display: inline-block; padding: 3px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; }
        .status-pending { background: rgba(245,158,11,0.15); color: #F59E0B; }
        .status-verified { background: rgba(16,185,129,0.15); color: #10B981; }
        .status-rejected { background: rgba(239,68,68,0.15); color: #EF4444; }

        /* Buttons */
        .btn { padding: 8px 16px; border-radius: 10px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; }
        .btn-primary { background: rgba(83,145,213,0.15); border: 1px solid rgba(83,145,213,0.3); color: var(--accent-blue); }
        .btn-primary:hover { background: rgba(83,145,213,0.25); }
        .btn-success { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); color: #10B981; }
        .btn-danger { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #EF4444; }
        .btn-sm { padding: 5px 10px; font-size: 11px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: none; align-items: center; justify-content: center; padding: 16px; }
        .modal-overlay.show { display: flex; }
        .modal { background: #1A1C24; border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 100%; max-width: 520px; max-height: 85vh; overflow-y: auto; }
        .modal-title { font-size: 16px; font-weight: 700; color: var(--text-primary); margin-bottom: 16px; }
        .form-group { margin-bottom: 14px; }
        .form-label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 5px; font-weight: 600; }
        .form-input, .form-select, .form-textarea { width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid var(--border); background: rgba(15,18,30,0.5); color: var(--text-primary); font-size: 13px; font-family: inherit; }
        .form-textarea { min-height: 80px; resize: vertical; }
        .form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--accent-blue); }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

        /* Filter bar */
        .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
        .filter-chip { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .filter-chip.active { background: rgba(83,145,213,0.15); border-color: rgba(83,145,213,0.3); color: var(--accent-blue); }
        .search-input { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: rgba(15,18,30,0.5); color: var(--text-primary); font-size: 12px; width: 200px; }

        /* Upload zone */
        .upload-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 30px; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 16px; }
        .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent-blue); background: rgba(83,145,213,0.05); }
        .upload-zone i { font-size: 32px; color: var(--text-secondary); margin-bottom: 8px; }
        .upload-zone p { font-size: 13px; color: var(--text-secondary); }

        /* Cards grid */
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
        .item-card { background: rgba(15,18,30,0.5); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
        .item-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .item-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; flex-shrink: 0; }
        .item-card-title { font-size: 14px; font-weight: 700; color: var(--text-primary); }
        .item-card-sub { font-size: 11px; color: var(--text-secondary); }
        .item-card-desc { font-size: 12px; color: var(--text-secondary); margin: 8px 0; line-height: 1.5; }
        .item-card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin: 8px 0; }
        .item-tag { padding: 2px 8px; border-radius: 6px; background: rgba(83,145,213,0.1); border: 1px solid rgba(83,145,213,0.2); color: var(--accent-blue); font-size: 10px; font-weight: 600; }
        .item-card-actions { display: flex; gap: 6px; margin-top: 10px; }

        /* Country badge */
        .country-code { display: inline-block; padding: 1px 6px; border-radius: 4px; background: rgba(83,145,213,0.15); color: var(--accent-blue); font-size: 10px; font-weight: 700; margin-right: 4px; }

        /* Type badge */
        .type-badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .type-video { background: rgba(239,68,68,0.15); color: #EF4444; }
        .type-presentation { background: rgba(245,158,11,0.15); color: #F59E0B; }
        .type-document { background: rgba(59,130,246,0.15); color: #3B82F6; }

        /* Access denied */
        .access-denied { text-align: center; padding: 60px 20px; }
        .access-denied i { font-size: 48px; color: #EF4444; margin-bottom: 16px; }
        .access-denied h2 { font-size: 20px; margin-bottom: 8px; }
        .access-denied p { color: var(--text-secondary); font-size: 14px; }

        /* Empty state */
        .empty-state { text-align: center; padding: 40px; color: var(--text-secondary); font-size: 13px; }
        .empty-state i { font-size: 32px; margin-bottom: 8px; display: block; }

        /* Loading */
        .loading { text-align: center; padding: 40px; color: var(--text-secondary); }

        /* Bottom nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(12, 15, 26, 0.95); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: grid; grid-template-columns: repeat(6, 1fr); padding: 8px 0 max(8px, env(safe-area-inset-bottom)); z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 4px 2px; text-decoration: none; color: var(--text-secondary); font-size: 10px; font-weight: 600; }
        .nav-item i { font-size: 18px; }
        .nav-item.active { color: var(--accent-blue); }

        @media (max-width: 480px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .cards-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Top Navigation -->
    <div class="top-nav">
        <div class="nav-header">
            <div class="nav-left">
                <a href="/01_Dashboard_Home.html" class="home-button"><svg class="vifm-icon"><use href="#icon-house"></use></svg> Home</a>
                <a href="/36_University_Programs.html" class="back-link"><svg class="vifm-icon"><use href="#icon-building-columns"></use></svg> Programs</a>
                <span class="page-title">Admin Panel</span>
            </div>
            <span class="admin-badge"><svg class="vifm-icon"><use href="#icon-shield-halved"></use></svg> Admin</span>
        </div>
    </div>

    <div class="container" style="padding-top: 16px;">
        <!-- Access denied placeholder -->
        <div id="accessDenied" style="display:none;" class="access-denied">
            <svg class="vifm-icon"><use href="#icon-lock"></use></svg>
            <h2>Admin Access Required</h2>
            <p>You must be logged in as a VIFM admin to access this panel.</p>
            <a href="/36_University_Programs.html" class="btn btn-primary" style="margin-top:16px;"><svg class="vifm-icon"><use href="#icon-arrow-left"></use></svg> Back to Programs</a>
        </div>

        <!-- Main admin content -->
        <div id="adminContent" style="display:none;">
            <!-- Tab navigation -->
            <div class="tab-nav" id="tabNav"></div>

            <!-- Tab panels get rendered by JS -->
            <div id="tabContent"></div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <a href="/01_Dashboard_Home.html" class="nav-item"><div class="nav-icon"><svg class="vifm-icon"><use href="#icon-house"></use></svg></div><div class="nav-label">Home</div></a>
        <a href="/25_Financial_Analyst.html" class="nav-item"><div class="nav-icon"><svg class="vifm-icon"><use href="#icon-robot"></use></svg></div><div class="nav-label">AI</div></a>
        <a href="/02_Analytics_Tab.html" class="nav-item"><div class="nav-icon"><svg class="vifm-icon"><use href="#icon-chart-column"></use></svg></div><div class="nav-label">Analytics</div></a>
        <a href="/22_Portfolio_Tracker.html" class="nav-item"><div class="nav-icon"><svg class="vifm-icon"><use href="#icon-briefcase"></use></svg></div><div class="nav-label">Portfolio</div></a>
        <a href="/24_News_Stream.html" class="nav-item"><div class="nav-icon"><svg class="vifm-icon"><use href="#icon-newspaper"></use></svg></div><div class="nav-label">News</div></a>
        <a href="/36_University_Programs.html" class="nav-item active"><div class="nav-icon"><svg class="vifm-icon"><use href="#icon-graduation-cap"></use></svg></div><div class="nav-label">Learning</div></a>
    </div>

    <script>
    (function() {
        'use strict';

        var authToken = localStorage.getItem('authToken') || 'demo-token';
        var state = { tab: 'dashboard', stats: null, partners: [], courses: [], enrollments: [], admins: [], statusFilter: 'all', uniFilter: '', search: '' };

        // ── DOM helpers ─────────────────────────────────
        function el(tag, props, children) {
            var e = document.createElement(tag);
            if (props) { for (var k in props) { if (k === 'className') e.className = props[k]; else if (k === 'onclick' || k === 'onchange' || k === 'oninput' || k === 'onsubmit') e[k] = props[k]; else if (k === 'style') e.style.cssText = props[k]; else if (k === 'htmlFor') e.htmlFor = props[k]; else e[k] = props[k]; } }
            if (children) children.forEach(function(c) { if (c) e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
            return e;
        }

        function mkSvgIcon(name, style) {
            var s = document.createElement('span');
            s.innerHTML = vifmIcon(name, style ? {style: style} : undefined);
            return s.firstChild;
        }

        function clearEl(id) { var e = document.getElementById(id); if (e) while (e.firstChild) e.removeChild(e.firstChild); return e; }

        // ── API helper ──────────────────────────────────
        async function api(method, path, body) {
            var opts = { method: method, headers: { 'Authorization': 'Bearer ' + authToken } };
            if (body && !(body instanceof FormData)) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
            else if (body instanceof FormData) { opts.body = body; }
            var res = await fetch('/api/university' + path, opts);
            return res.json();
        }

        // ── Modal ───────────────────────────────────────
        var modalOverlay = null;
        function showModal(title, contentFn) {
            if (modalOverlay) document.body.removeChild(modalOverlay);
            modalOverlay = el('div', { className: 'modal-overlay show', onclick: function(e) { if (e.target === modalOverlay) hideModal(); } });
            var modal = el('div', { className: 'modal' });
            modal.appendChild(el('div', { className: 'modal-title', textContent: title }));
            contentFn(modal);
            modalOverlay.appendChild(modal);
            document.body.appendChild(modalOverlay);
        }
        function hideModal() { if (modalOverlay) { document.body.removeChild(modalOverlay); modalOverlay = null; } }

        // ── Tab system ──────────────────────────────────
        var TABS = [
            { id: 'dashboard', label: 'Dashboard', icon: 'chart-pie' },
            { id: 'universities', label: 'Universities', icon: 'building-columns' },
            { id: 'courses', label: 'Courses', icon: 'book' },
            { id: 'enrollments', label: 'Enrollments', icon: 'users' }
        ];

        function renderTabs() {
            var nav = clearEl('tabNav');
            TABS.forEach(function(t) {
                var btn = el('button', {
                    className: 'tab-btn' + (state.tab === t.id ? ' active' : ''),
                    onclick: function() { state.tab = t.id; renderTabs(); renderTabContent(); }
                }, [mkSvgIcon(t.icon), document.createTextNode(' ' + t.label)]);
                if (t.id === 'enrollments' && state.stats && state.stats.pending_verifications > 0) {
                    btn.appendChild(el('span', { className: 'badge-count', textContent: String(state.stats.pending_verifications) }));
                }
                nav.appendChild(btn);
            });
        }

        function renderTabContent() {
            var c = clearEl('tabContent');
            if (state.tab === 'dashboard') renderDashboard(c);
            else if (state.tab === 'universities') renderUniversities(c);
            else if (state.tab === 'courses') renderCourses(c);
            else if (state.tab === 'enrollments') renderEnrollments(c);
        }

        // ── Dashboard ───────────────────────────────────
        function renderDashboard(container) {
            var s = state.stats || {};
            var grid = el('div', { className: 'stats-grid' });
            var items = [
                { v: s.total_partners || 0, l: 'Universities', w: false },
                { v: s.total_courses || 0, l: 'Courses', w: false },
                { v: s.total_modules || 0, l: 'Modules', w: false },
                { v: s.total_enrollments || 0, l: 'Enrollments', w: false },
                { v: s.pending_verifications || 0, l: 'Pending', w: true },
                { v: s.verified_count || 0, l: 'Verified', w: false }
            ];
            items.forEach(function(it) {
                grid.appendChild(el('div', { className: 'stat-card' + (it.w && it.v > 0 ? ' warn' : '') }, [
                    el('div', { className: 'stat-val', textContent: String(it.v) }),
                    el('div', { className: 'stat-lbl', textContent: it.l })
                ]));
            });
            container.appendChild(el('div', { className: 'glass-card' }, [
                el('div', { className: 'section-title' }, [mkSvgIcon('chart-pie'), document.createTextNode(' Overview')]),
                grid
            ]));

            // Recent enrollments
            var recent = (s.recent_enrollments || []).slice(0, 10);
            var card2 = el('div', { className: 'glass-card' });
            card2.appendChild(el('div', { className: 'section-title' }, [mkSvgIcon('clock'), document.createTextNode(' Recent Enrollments')]));
            if (recent.length === 0) {
                card2.appendChild(el('div', { className: 'empty-state' }, [mkSvgIcon('inbox'), document.createTextNode('No enrollments yet')]));
            } else {
                var tw = el('div', { className: 'table-wrap' });
                var table = el('table', { className: 'admin-table' });
                var thead = el('tr');
                ['Name', 'Email', 'University', 'Status', 'Date'].forEach(function(h) { thead.appendChild(el('th', { textContent: h })); });
                table.appendChild(thead);
                recent.forEach(function(en) {
                    var tr = el('tr');
                    tr.appendChild(el('td', { textContent: en.full_name }));
                    tr.appendChild(el('td', { textContent: en.email }));
                    tr.appendChild(el('td', { textContent: en.university_partners ? en.university_partners.name : '-' }));
                    var statusTd = el('td');
                    statusTd.appendChild(el('span', { className: 'status-badge status-' + en.verification_status, textContent: en.verification_status }));
                    tr.appendChild(statusTd);
                    tr.appendChild(el('td', { textContent: new Date(en.enrolled_at).toLocaleDateString() }));
                    table.appendChild(tr);
                });
                tw.appendChild(table);
                card2.appendChild(tw);
            }
            container.appendChild(card2);
        }

        // ── Universities ────────────────────────────────
        function renderUniversities(container) {
            var card = el('div', { className: 'glass-card' });
            card.appendChild(el('div', { className: 'top-bar' }, [
                el('div', { className: 'section-title', style: 'margin-bottom:0;' }, [mkSvgIcon('building-columns'), document.createTextNode(' Partner Universities')]),
                el('button', { className: 'btn btn-primary', onclick: function() { showPartnerModal(null); } }, [mkSvgIcon('plus'), document.createTextNode(' Add University')])
            ]));

            if (state.partners.length === 0) {
                card.appendChild(el('div', { className: 'empty-state' }, [mkSvgIcon('building'), document.createTextNode('No universities yet. Add your first partner university.')]));
            } else {
                var grid = el('div', { className: 'cards-grid' });
                state.partners.forEach(function(p) {
                    var ic = el('div', { className: 'item-icon', style: 'background:' + (p.accent_color || '#7C3AED') + '1A;color:' + (p.accent_color || '#7C3AED') + ';' });
                    ic.appendChild(el('span', { textContent: p.name.charAt(0) }));

                    var tags = el('div', { className: 'item-card-tags' });
                    (p.programs || []).forEach(function(pr) { tags.appendChild(el('span', { className: 'item-tag', textContent: pr })); });

                    var actions = el('div', { className: 'item-card-actions' });
                    actions.appendChild(el('button', { className: 'btn btn-primary btn-sm', onclick: function() { showPartnerModal(p); } }, [mkSvgIcon('pen'), document.createTextNode(' Edit')]));
                    if (p.is_active !== false) {
                        actions.appendChild(el('button', { className: 'btn btn-danger btn-sm', onclick: function() { deletePartner(p.id); } }, [mkSvgIcon('trash'), document.createTextNode(' Delete')]));
                    }

                    grid.appendChild(el('div', { className: 'item-card' }, [
                        el('div', { className: 'item-card-header' }, [ic, el('div', {}, [
                            el('div', { className: 'item-card-title', textContent: p.full_name || p.name }),
                            el('div', { className: 'item-card-sub' }, [el('span', { className: 'country-code', textContent: p.country_code }), document.createTextNode(p.country + (p.email_domain ? ' \u00B7 @' + p.email_domain : ''))])
                        ])]),
                        el('div', { className: 'item-card-desc', textContent: (p.description || '').substring(0, 120) }),
                        tags, actions
                    ]));
                });
                card.appendChild(grid);
            }
            container.appendChild(card);
        }

        function showPartnerModal(existing) {
            var isEdit = !!existing;
            showModal(isEdit ? 'Edit University' : 'Add University', function(modal) {
                var fields = [
                    { id: 'slug', label: 'Slug (URL-friendly)', value: existing ? existing.slug : '', ph: 'e.g. kfupm' },
                    { id: 'name', label: 'Short Name', value: existing ? existing.name : '', ph: 'e.g. KFUPM' },
                    { id: 'full_name', label: 'Full Name', value: existing ? existing.full_name : '', ph: 'e.g. King Fahd University...' },
                    { id: 'country', label: 'Country', value: existing ? existing.country : '', ph: 'e.g. Saudi Arabia' },
                    { id: 'country_code', label: 'Country Code', value: existing ? existing.country_code : '', ph: 'e.g. SA' },
                    { id: 'email_domain', label: 'Email Domain (for auto-verify)', value: existing ? existing.email_domain || '' : '', ph: 'e.g. kfupm.edu.sa' },
                    { id: 'description', label: 'Description', value: existing ? existing.description || '' : '', ph: 'Brief description...', type: 'textarea' }
                ];
                fields.forEach(function(f) {
                    var grp = el('div', { className: 'form-group' });
                    grp.appendChild(el('label', { className: 'form-label', textContent: f.label, htmlFor: 'pf_' + f.id }));
                    if (f.type === 'textarea') {
                        grp.appendChild(el('textarea', { className: 'form-textarea', id: 'pf_' + f.id, value: f.value, placeholder: f.ph }));
                    } else {
                        grp.appendChild(el('input', { className: 'form-input', id: 'pf_' + f.id, value: f.value, placeholder: f.ph }));
                    }
                    modal.appendChild(grp);
                });
                // Programs
                var progGrp = el('div', { className: 'form-group' });
                progGrp.appendChild(el('label', { className: 'form-label', textContent: 'Programs (comma-separated)' }));
                progGrp.appendChild(el('input', { className: 'form-input', id: 'pf_programs', value: existing ? (existing.programs || []).join(', ') : '', placeholder: 'BSc Finance, MBA, MSc Economics' }));
                modal.appendChild(progGrp);

                var actions = el('div', { className: 'modal-actions' });
                actions.appendChild(el('button', { className: 'btn', textContent: 'Cancel', onclick: hideModal }));
                actions.appendChild(el('button', { className: 'btn btn-primary', textContent: isEdit ? 'Update' : 'Create', onclick: async function() {
                    var data = {};
                    fields.forEach(function(f) { data[f.id] = document.getElementById('pf_' + f.id).value.trim(); });
                    var progStr = document.getElementById('pf_programs').value;
                    data.programs = progStr ? progStr.split(',').map(function(s) { return s.trim(); }).filter(Boolean) : [];

                    if (isEdit) await api('PUT', '/admin/partners/' + existing.id, data);
                    else await api('POST', '/admin/partners', data);
                    hideModal(); await loadData();
                }}));
                modal.appendChild(actions);
            });
        }

        async function deletePartner(id) {
            if (!confirm('Remove this university partner?')) return;
            await api('DELETE', '/admin/partners/' + id);
            await loadData();
        }

        // ── Courses ─────────────────────────────────────
        function renderCourses(container) {
            var card = el('div', { className: 'glass-card' });
            card.appendChild(el('div', { className: 'top-bar' }, [
                el('div', { className: 'section-title', style: 'margin-bottom:0;' }, [mkSvgIcon('book'), document.createTextNode(' Academic Courses')]),
                el('button', { className: 'btn btn-primary', onclick: function() { showCourseModal(null); } }, [mkSvgIcon('plus'), document.createTextNode(' Add Course')])
            ]));

            if (state.courses.length === 0) {
                card.appendChild(el('div', { className: 'empty-state' }, [mkSvgIcon('book-open'), document.createTextNode('No courses yet. Add your first academic course.')]));
            } else {
                var grid = el('div', { className: 'cards-grid' });
                state.courses.forEach(function(c) {
                    var ic = el('div', { className: 'item-icon', style: 'background:' + (c.accent_color || '#5B8DEF') + '1A;color:' + (c.accent_color || '#5B8DEF') + ';' });
                    ic.appendChild(mkSvgIcon(c.icon || 'book'));

                    var tags = el('div', { className: 'item-card-tags' });
                    (c.cfa_alignment || []).forEach(function(t) { tags.appendChild(el('span', { className: 'item-tag', textContent: t })); });

                    var modBadge = el('span', { style: 'font-size:11px;color:var(--text-secondary);', textContent: (c.module_count || 0) + ' modules \u00B7 ' + (c.total_steps || 0) + ' steps' });

                    var actions = el('div', { className: 'item-card-actions' });
                    actions.appendChild(el('button', { className: 'btn btn-primary btn-sm', onclick: function() { showCourseModal(c); } }, [mkSvgIcon('pen'), document.createTextNode(' Edit')]));
                    actions.appendChild(el('button', { className: 'btn btn-sm', style: 'background:rgba(6,182,212,0.15);border:1px solid rgba(6,182,212,0.3);color:#06B6D4;', onclick: function() { showModulesPanel(c); } }, [mkSvgIcon('folder-open'), document.createTextNode(' Modules')]));
                    actions.appendChild(el('button', { className: 'btn btn-danger btn-sm', onclick: function() { deleteCourse(c.id); } }, [mkSvgIcon('trash')]));

                    grid.appendChild(el('div', { className: 'item-card' }, [
                        el('div', { className: 'item-card-header' }, [ic, el('div', {}, [
                            el('div', { className: 'item-card-title', textContent: c.name }),
                            el('div', { className: 'item-card-sub', textContent: c.level || '' })
                        ])]),
                        el('div', { className: 'item-card-desc', textContent: (c.description || '').substring(0, 120) }),
                        modBadge, tags, actions
                    ]));
                });
                card.appendChild(grid);
            }
            container.appendChild(card);
        }

        function showCourseModal(existing) {
            var isEdit = !!existing;
            showModal(isEdit ? 'Edit Course' : 'Add Course', function(modal) {
                var fields = [
                    { id: 'slug', label: 'Slug', value: existing ? existing.slug : '', ph: 'e.g. investment' },
                    { id: 'name', label: 'Course Name', value: existing ? existing.name : '', ph: 'e.g. Investment Analysis' },
                    { id: 'level', label: 'Level', value: existing ? existing.level || '' : '', ph: 'e.g. Undergraduate / Graduate' },
                    { id: 'icon', label: 'Icon (FA name)', value: existing ? existing.icon || '' : '', ph: 'e.g. chart-line' },
                    { id: 'accent_color', label: 'Color', value: existing ? existing.accent_color || '' : '#5B8DEF', ph: '#5B8DEF' },
                    { id: 'total_steps', label: 'Total Steps', value: existing ? String(existing.total_steps || 0) : '0', ph: '0' },
                    { id: 'description', label: 'Description', value: existing ? existing.description || '' : '', ph: 'Course description...', type: 'textarea' }
                ];
                fields.forEach(function(f) {
                    var grp = el('div', { className: 'form-group' });
                    grp.appendChild(el('label', { className: 'form-label', textContent: f.label }));
                    if (f.type === 'textarea') grp.appendChild(el('textarea', { className: 'form-textarea', id: 'cf_' + f.id, value: f.value, placeholder: f.ph }));
                    else grp.appendChild(el('input', { className: 'form-input', id: 'cf_' + f.id, value: f.value, placeholder: f.ph }));
                    modal.appendChild(grp);
                });

                var cfaGrp = el('div', { className: 'form-group' });
                cfaGrp.appendChild(el('label', { className: 'form-label', textContent: 'CFA Alignment (comma-separated)' }));
                cfaGrp.appendChild(el('input', { className: 'form-input', id: 'cf_cfa', value: existing ? (existing.cfa_alignment || []).join(', ') : '', placeholder: 'CFA L1: Equity, CFA L2: Quant' }));
                modal.appendChild(cfaGrp);

                var actions = el('div', { className: 'modal-actions' });
                actions.appendChild(el('button', { className: 'btn', textContent: 'Cancel', onclick: hideModal }));
                actions.appendChild(el('button', { className: 'btn btn-primary', textContent: isEdit ? 'Update' : 'Create', onclick: async function() {
                    var data = {};
                    fields.forEach(function(f) { data[f.id] = document.getElementById('cf_' + f.id).value.trim(); });
                    data.total_steps = parseInt(data.total_steps) || 0;
                    var cfaStr = document.getElementById('cf_cfa').value;
                    data.cfa_alignment = cfaStr ? cfaStr.split(',').map(function(s) { return s.trim(); }).filter(Boolean) : [];

                    if (isEdit) await api('PUT', '/admin/courses/' + existing.id, data);
                    else await api('POST', '/admin/courses', data);
                    hideModal(); await loadData();
                }}));
                modal.appendChild(actions);
            });
        }

        async function deleteCourse(id) {
            if (!confirm('Remove this course? All modules will also be removed.')) return;
            await api('DELETE', '/admin/courses/' + id);
            await loadData();
        }

        // ── Modules Panel ───────────────────────────────
        function showModulesPanel(course) {
            showModal('Modules: ' + course.name, async function(modal) {
                var loader = el('div', { className: 'loading', textContent: 'Loading modules...' });
                modal.appendChild(loader);

                var result = await api('GET', '/admin/courses/' + course.id + '/modules');
                modal.removeChild(loader);

                var modules = result.modules || [];
                if (modules.length === 0) {
                    modal.appendChild(el('div', { className: 'empty-state', style: 'padding:20px;' }, [document.createTextNode('No modules yet.')]));
                } else {
                    modules.forEach(function(m) {
                        var typeClass = 'type-' + m.content_type;
                        var row = el('div', { style: 'display:flex;align-items:center;gap:10px;padding:10px;border-bottom:1px solid var(--border);' }, [
                            el('span', { className: 'type-badge ' + typeClass, textContent: m.content_type }),
                            el('div', { style: 'flex:1;' }, [
                                el('div', { style: 'font-weight:600;font-size:13px;', textContent: m.title }),
                                el('div', { style: 'font-size:11px;color:var(--text-secondary);', textContent: (m.file_name || 'No file') + (m.duration_minutes ? ' \u00B7 ' + m.duration_minutes + ' min' : '') })
                            ]),
                            el('button', { className: 'btn btn-danger btn-sm', onclick: async function() { await api('DELETE', '/admin/modules/' + m.id); showModulesPanel(course); } }, [mkSvgIcon('trash')])
                        ]);
                        modal.appendChild(row);
                    });
                }

                // Add module form
                modal.appendChild(el('div', { style: 'margin-top:16px;padding-top:16px;border-top:1px solid var(--border);' }, [
                    el('div', { style: 'font-weight:700;font-size:13px;margin-bottom:12px;', textContent: 'Add New Module' })
                ]));

                var titleInput = el('input', { className: 'form-input', placeholder: 'Module title', style: 'margin-bottom:8px;' });
                var typeSelect = el('select', { className: 'form-select', style: 'margin-bottom:8px;' });
                ['video', 'presentation', 'document'].forEach(function(t) { typeSelect.appendChild(el('option', { value: t, textContent: t.charAt(0).toUpperCase() + t.slice(1) })); });
                var durationInput = el('input', { className: 'form-input', placeholder: 'Duration (minutes, for videos)', type: 'number', style: 'margin-bottom:8px;' });
                var fileInput = el('input', { type: 'file', style: 'margin-bottom:8px;font-size:12px;color:var(--text-secondary);' });

                modal.appendChild(titleInput);
                modal.appendChild(typeSelect);
                modal.appendChild(durationInput);
                modal.appendChild(fileInput);

                var addBtn = el('button', { className: 'btn btn-primary', textContent: 'Upload & Add Module', onclick: async function() {
                    var title = titleInput.value.trim();
                    if (!title) { titleInput.focus(); return; }

                    var moduleData = { title: title, content_type: typeSelect.value, duration_minutes: parseInt(durationInput.value) || null };

                    // Upload file if selected
                    if (fileInput.files && fileInput.files[0]) {
                        addBtn.textContent = 'Uploading...';
                        addBtn.disabled = true;
                        var fd = new FormData();
                        fd.append('file', fileInput.files[0]);
                        fd.append('courseSlug', course.slug);
                        var uploadRes = await api('POST', '/admin/upload', fd);
                        if (uploadRes.success) {
                            moduleData.file_url = uploadRes.url;
                            moduleData.file_name = uploadRes.filename;
                            moduleData.file_size = uploadRes.size;
                        }
                    }

                    await api('POST', '/admin/courses/' + course.id + '/modules', moduleData);
                    showModulesPanel(course); // Refresh
                }});
                modal.appendChild(addBtn);
            });
        }

        // ── Enrollments ─────────────────────────────────
        function renderEnrollments(container) {
            var card = el('div', { className: 'glass-card' });
            card.appendChild(el('div', { className: 'section-title' }, [mkSvgIcon('users'), document.createTextNode(' Student Enrollments')]));

            // Filter bar
            var bar = el('div', { className: 'filter-bar' });
            ['all', 'pending', 'verified', 'rejected'].forEach(function(s) {
                bar.appendChild(el('button', {
                    className: 'filter-chip' + (state.statusFilter === s ? ' active' : ''),
                    textContent: s.charAt(0).toUpperCase() + s.slice(1),
                    onclick: function() { state.statusFilter = s; loadEnrollments(); }
                }));
            });
            var searchIn = el('input', { className: 'search-input', placeholder: 'Search name/email...', value: state.search, oninput: function() { state.search = this.value; } });
            searchIn.addEventListener('keyup', function(e) { if (e.key === 'Enter') loadEnrollments(); });
            bar.appendChild(searchIn);
            card.appendChild(bar);

            // Table
            var tw = el('div', { className: 'table-wrap', id: 'enrollTable' });
            card.appendChild(tw);
            container.appendChild(card);
            renderEnrollmentTable();
        }

        function renderEnrollmentTable() {
            var tw = clearEl('enrollTable');
            if (!tw) return;
            var list = state.enrollments;
            if (list.length === 0) {
                tw.appendChild(el('div', { className: 'empty-state' }, [mkSvgIcon('inbox'), document.createTextNode('No enrollments match this filter')]));
                return;
            }
            var table = el('table', { className: 'admin-table' });
            var thead = el('tr');
            ['Name', 'Email', 'University', 'Program', 'Status', 'Date', 'Actions'].forEach(function(h) { thead.appendChild(el('th', { textContent: h })); });
            table.appendChild(thead);

            list.forEach(function(en) {
                var tr = el('tr');
                tr.appendChild(el('td', { textContent: en.full_name }));
                tr.appendChild(el('td', { style: 'font-size:11px;', textContent: en.email }));
                tr.appendChild(el('td', { textContent: en.university_partners ? en.university_partners.name : '-' }));
                tr.appendChild(el('td', { textContent: en.program || '-' }));
                var statusTd = el('td');
                statusTd.appendChild(el('span', { className: 'status-badge status-' + en.verification_status, textContent: en.verification_status }));
                tr.appendChild(statusTd);
                tr.appendChild(el('td', { style: 'font-size:11px;', textContent: new Date(en.enrolled_at).toLocaleDateString() }));

                var actionsTd = el('td');
                if (en.verification_status === 'pending') {
                    actionsTd.appendChild(el('button', { className: 'btn btn-success btn-sm', onclick: function() { verifyEnrollment(en.id, 'verified'); } }, [mkSvgIcon('check')]));
                    actionsTd.appendChild(document.createTextNode(' '));
                    actionsTd.appendChild(el('button', { className: 'btn btn-danger btn-sm', onclick: function() { verifyEnrollment(en.id, 'rejected'); } }, [mkSvgIcon('xmark')]));
                } else {
                    actionsTd.appendChild(el('button', { className: 'btn btn-sm', style: 'background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--text-secondary);', onclick: function() { verifyEnrollment(en.id, 'pending'); } }, [document.createTextNode('Reset')]));
                }
                tr.appendChild(actionsTd);
                table.appendChild(tr);
            });
            tw.appendChild(table);
        }

        async function verifyEnrollment(id, status) {
            await api('PUT', '/admin/enrollments/' + id + '/verify', { status: status });
            await loadEnrollments();
            await loadDashboard();
        }

        async function loadEnrollments() {
            var params = [];
            if (state.statusFilter !== 'all') params.push('status=' + state.statusFilter);
            if (state.search) params.push('search=' + encodeURIComponent(state.search));
            var qs = params.length ? '?' + params.join('&') : '';
            var res = await api('GET', '/admin/enrollments' + qs);
            state.enrollments = res.enrollments || [];
            renderEnrollmentTable();
        }

        // ── Data loading ────────────────────────────────
        async function loadDashboard() {
            var res = await api('GET', '/admin/dashboard');
            state.stats = res.stats || {};
        }

        async function loadData() {
            await Promise.all([
                loadDashboard(),
                api('GET', '/admin/partners').then(function(r) { state.partners = r.partners || []; }),
                api('GET', '/admin/courses').then(function(r) { state.courses = r.courses || []; }),
                loadEnrollments()
            ]);
            renderTabs();
            renderTabContent();
        }

        // ── Init ────────────────────────────────────────
        async function init() {
            // Check admin access
            var res = await api('GET', '/admin/dashboard');
            if (!res.success) {
                document.getElementById('accessDenied').style.display = 'block';
                return;
            }
            document.getElementById('adminContent').style.display = 'block';
            await loadData();

            }
        }

        init();
    })();
    </script>
</body>
</html>
